<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System Verification</title>
    <style>
        body { background: #121218; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e1e24; padding: 40px; border-radius: 12px; border: 1px solid #2d2d3c; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #a0a0b0; font-size: 14px; }
        .key-box { background: #0a0a0f; padding: 20px; margin-top: 25px; font-family: monospace; font-size: 28px; color: #00ff66; border-radius: 8px; border: 1px solid #00ff66; display: none; user-select: all; cursor: pointer; letter-spacing: 2px;}
    </style>
</head>
<body>
    <div class="container">
        <h1 id="status">Verifying your token...</h1>
        <p id="sub-status">Please wait while we communicate with the server.</p>
        <div id="key-box" class="key-box" onclick="copyKey()"></div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR LIVE RENDER URL (NO SLASH AT THE END)
        const BACKEND_URL = "https://YOUR-RENDER-APP-NAME.onrender.com";

        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                document.getElementById("status").innerText = "Error: No Token";
                document.getElementById("sub-status").innerText = "You must start the process from the Roblox script.";
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/verify-token`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.completedAll) {
                        document.getElementById("status").innerText = "Authentication Successful!";
                        document.getElementById("sub-status").innerText = "Copy the key below and paste it into the Roblox executor.";
                        const keyBox = document.getElementById("key-box");
                        keyBox.innerText = data.key;
                        keyBox.style.display = "block";
                    } else {
                        document.getElementById("status").innerText = "Checkpoint 1 Complete!";
                        document.getElementById("sub-status").innerText = "Redirecting you to the final step...";
                        setTimeout(() => { window.location.href = data.nextLink; }, 1500);
                    }
                } else {
                    document.getElementById("status").innerText = "Authentication Failed";
                    document.getElementById("sub-status").innerText = data.message || "Invalid or expired token.";
                }
            } catch (err) {
                document.getElementById("status").innerText = "Server Offline";
                document.getElementById("sub-status").innerText = "Error linking up with the key validation server. The server might be asleep.";
            }
        }

        function copyKey() {
            const keyText = document.getElementById("key-box").innerText;
            navigator.clipboard.writeText(keyText);
            document.getElementById("sub-status").innerText = "Key copied to clipboard!";
            document.getElementById("sub-status").style.color = "#00ff66";
        }

        verify();
    </script>
</body>
</html>
