<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Script Hub</title>
    <style>
        :root {
            --bg-main: #09090b;
            --bg-card: #141417;
            --accent: #ff2a2a;
            --accent-glow: rgba(255, 42, 42, 0.3);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1a24 0%, #09090b 100%);
        }

        .card {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #27272a;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s ease;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .key-container {
            display: none;
            background: #000;
            border: 1px dashed var(--accent);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .key-container:hover {
            background: #111;
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .key-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            letter-spacing: 2px;
        }

        .copy-hint {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* Loading Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #3f3f46;
            border-bottom-color: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="loading-spinner" class="loader"></div>
        <div class="title" id="status">Authenticating...</div>
        <div class="subtitle" id="sub-status">Establishing secure connection to the server.</div>
        
        <div class="key-container" id="key-box" onclick="copyKey()">
            <div class="key-text" id="key-value">LOADING...</div>
            <span class="copy-hint" id="copy-hint">Click box to copy</span>
        </div>
    </div>

    <script>
        // ==========================================
        // REPLACE WITH YOUR LIVE RENDER URL
        // ==========================================
        const BACKEND_URL = "https://key-system-backend-c1.onrender.com";

        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (!token) {
                showError("Access Denied", "No valid token found. Please generate a link from the Roblox script.");
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/verify-token`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token })
                });
                
                const data = await response.json();
                document.getElementById("loading-spinner").style.display = "none";
                
                if (data.success) {
                    if (data.completedAll) {
                        document.getElementById("status").innerText = "Verification Complete";
                        document.getElementById("status").style.color = "var(--success)";
                        document.getElementById("sub-status").innerText = "Your unique hardware key has been generated.";
                        
                        const keyBox = document.getElementById("key-box");
                        document.getElementById("key-value").innerText = data.key;
                        keyBox.style.display = "block";
                        keyBox.style.borderColor = "var(--success)";
                    } else {
                        document.getElementById("status").innerText = "Checkpoint Reached";
                        document.getElementById("sub-status").innerText = "Routing you to the final destination...";
                        setTimeout(() => { window.location.href = data.nextLink; }, 1500);
                    }
                } else {
                    showError("Authentication Failed", data.message || "Your token has expired or is invalid.");
                }
            } catch (err) {
                showError("Server Offline", "Failed to connect to the validation server. It may be sleeping.");
            }
        }

        function showError(title, message) {
            document.getElementById("loading-spinner").style.display = "none";
            document.getElementById("status").innerText = title;
            document.getElementById("status").style.color = "var(--accent)";
            document.getElementById("sub-status").innerText = message;
        }

        function copyKey() {
            const keyText = document.getElementById("key-value").innerText;
            navigator.clipboard.writeText(keyText);
            
            const hint = document.getElementById("copy-hint");
            hint.innerText = "COPIED TO CLIPBOARD!";
            hint.style.color = "var(--success)";
            
            setTimeout(() => {
                hint.innerText = "Click box to copy";
                hint.style.color = "var(--text-muted)";
            }, 2000);
        }

        // Boot the check immediately
        verify();
    </script>
</body>
</html>
